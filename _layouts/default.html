<!DOCTYPE html>
<html lang="en" class="no-js">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">

  <!-- HTML Meta Tags -->
  <title>{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">

  <!-- Google / Search Engine Tags -->
  <meta itemprop="name" content="{{ site.title }}">
  <meta itemprop="description" content="{{ site.description }}">
  <meta itemprop="image" content="https://avatars.githubusercontent.com/u/40741601">

  <!-- Facebook Meta Tags -->
  <meta property="og:url" content="{{ site.url }}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:image" content="https://avatars.githubusercontent.com/u/40741601">

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ site.title }}">
  <meta name="twitter:description" content="{{ site.description }}">
  <meta name="twitter:image" content="https://avatars.githubusercontent.com/u/40741601">

  <!-- Meta Tags Generated via http://heymeta.com -->

  <link rel="canonical" href="{{ site.url }}">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5/css/fontawesome.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5/css/brands.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5/css/solid.min.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sanitize.css@12/assets.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sanitize.css@12/forms.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sanitize.css@12/page.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sanitize.css@12/reduce-motion.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sanitize.css@12/sanitize.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sanitize.css@12/typography.min.css">

  <style>
    body {
      font-size: 150%;
    }
  </style>
</head>

<body>
  <article>
    <div class="container">
      {{ content }}
    </div>
  </article>
</body>

</html>
